/**:
  ros__parameters:
    frame_id: "base_footprint"
    odom_frame_id: "odom"
    odom_topic: "/odom"
    subscribe_odom: true
    subscribe_depth: true
    subscribe_scan: false
    subscribe_odom_info: false
    approx_sync: true
    approx_sync_max_interval: 0.2
    odom_sensor_sync: true
    # Loosen wheel-yaw trust so depth ICP can correct turn errors on walls.
    odom_tf_linear_variance: 0.002
    odom_tf_angular_variance: 0.08
    topic_queue_size: 50
    sync_queue_size: 50
    qos_image: 1
    qos_odom: 1
    qos_camera_info: 1
    wait_imu_to_init: false
    publish_tf: true
    tf_delay: 0.05
    # Visual + depth ICP for walls; loop closure + graph optimization (no rgbd_odometry VO).
    Reg/Force3DoF: "false"
    Reg/Strategy: "2"
    Odom/GuessMotion: "false"
    Optimizer/Gravity: "false"
    Optimizer/GravitySigma: "0"
    Optimizer/Iterations: "20"
    RGBD/CreateOccupancyGrid: "true"
    RGBD/NeighborLinkRefining: "true"
    RGBD/LinearUpdate: "0.05"
    RGBD/AngularUpdate: "0.05"
    RGBD/OptimizeFromGraphEnd: "true"
    RGBD/ProximityBySpace: "true"
    RGBD/ProximityByTime: "true"
    RGBD/ProximityMaxNeighbors: "3"
    RGBD/ProximityPathMaxNeighbors: "2"
    RGBD/LocalBundleOnLoopClosure: "true"
    RGBD/LoopClosureIdentityGuess: "true"
    RGBD/OptimizeMaxError: "4.0"
    RGBD/LocalRadius: "5.0"
    RGBD/MinDepth: "0.08"
    RGBD/MaxDepth: "4.0"
    Rtabmap/DetectionRate: "1.0"
    Rtabmap/LoopThr: "0.12"
    VhEp/Enabled: "false"
    Reg/MaxTranslation: "5.0"
    Reg/MaxRotation: "2.0"
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    Grid/Sensor: "1"
    Grid/RangeMin: "0.08"
    Grid/RangeMax: "4.0"
    Grid/CellSize: "0.03"
    Grid/DepthDecimation: "2"
    Grid/3D: "true"
    Grid/GroundIsObstacle: "true"
    Grid/NormalsSegmentation: "false"
    Grid/MapFrameProjection: "false"
    Grid/PreVoxelFiltering: "false"
    GridGlobal/MinSize: "20"
    Icp/PointToPlane: "true"
    Icp/MaxCorrespondenceDistance: "0.15"
    Icp/VoxelSize: "0.04"
    Icp/PointToPlaneK: "10"
    Icp/Iterations: "30"
    Icp/CorrespondenceRatio: "0.15"
    Vis/MinInliers: "6"
    Vis/MaxFeatures: "1200"
    Vis/FeatureType: "0"
    GFTT/MinDistance: "5.0"
    GFTT/QualityLevel: "0.001"
    Vis/CorNNDR: "0.7"
    wait_for_transform: 0.5
    tf_tolerance: 0.3
