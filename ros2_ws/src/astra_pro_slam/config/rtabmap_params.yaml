/**:
  ros__parameters:
    frame_id: "camera_link"
    subscribe_depth: true
    subscribe_odom_info: true
    # Official driver syncs RGB-D but stamps may differ by a few ms; use approx sync.
    approx_sync: true
    approx_sync_max_interval: 0.05
    topic_queue_size: 30
    sync_queue_size: 30
    wait_imu_to_init: false
    publish_tf: true
    tf_delay: 0.05
    Reg/Strategy: "0"
    Reg/Force3DoF: "false"
    RGBD/LinearUpdate: "0.05"
    RGBD/AngularUpdate: "0.05"
    RGBD/OptimizeFromGraphEnd: "false"
    RGBD/NeighborLinkRefining: "true"
    RGBD/ProximityBySpace: "true"
    Rtabmap/DetectionRate: "2.0"
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    Grid/RangeMax: "4.0"
    Grid/CellSize: "0.05"
    GridGlobal/MinSize: "20"
    Vis/MinInliers: "12"
    Vis/MaxFeatures: "1200"
    Vis/FeatureType: "0"
    GFTT/MinDistance: "5.0"
    GFTT/QualityLevel: "0.001"
    Vis/CorNNDR: "0.7"
    OdomF2M/MaxSize: "2000"
    OdomF2M/BundleAdjustment: "1"
    Odom/ResetCountdown: "3"
    Odom/GuessMotion: "true"
    Odom/KeyFrameThr: "0.3"
    wait_for_transform: 0.3
    tf_tolerance: 0.2
