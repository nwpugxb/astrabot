; ESP32 WROOM lower-computer for the indoor inspection robot.
; micro-ROS node: publishes /odom, /imu/data_raw, /tof_front|left|right ;
; subscribes /cmd_vel. Dual-core: micro-ROS (+ WiFi) on core 0, real-time control on core 1.
;
; Deck robot (DRV8871) — pick ONE transport env:
;   USB serial (default, PWM tune / debug):
;     pio run -e esp32dev_l298n -t upload
;     scripts/run_microros_agent.sh /dev/ttyUSB0
;   WiFi:
;     pio run -e esp32dev_l298n_wifi -t upload
;     scripts/run_microros_agent_wifi.sh
;
; Stepper robot (indoor inspection):
;   pio run -e esp32dev -t upload          (serial)
;   pio run -e esp32dev_wifi -t upload     (WiFi)
;
; Monitor: pio device monitor  (serial builds only; do not run while agent uses the port)
;
; IMPORTANT: default_envs is esp32dev_l298n (USB serial). Plain `pio run -t upload` flashes
; serial only. WiFi requires: pio run -e esp32dev_l298n_wifi -t upload
;
; RPLIDAR A1 UART↔WiFi TCP client bridge (no micro-ROS):
;   ESP32 connects to PC HOST_IP:20108 (config_rplidar_bridge.h)
;   pio run -e esp32dev_rplidar_bridge -t upload
;   scripts/flash_rplidar_bridge.sh
;   scripts/run_rplidar_wifi.sh

[platformio]
default_envs = esp32dev_l298n

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600
board_microros_distro = humble
board_microros_transport = serial
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    gin66/FastAccelStepper@^0.31.5
    robtillaart/AS5600@^0.6.5
    hideakitai/MPU9250@^0.4.8
    pololu/VL53L1X@^1.3.1
build_flags =
    -D CONFIG_MICRO_ROS_APP_STACK=4096
    -D CONFIG_MICRO_ROS_APP_TASK_PRIO=5

[env:esp32dev_wifi]
extends = env:esp32dev
board_microros_transport = wifi

; Legacy deck robot: DRV8871 x2 + hall encoders + MPU9250 + VL53L0X/L1X x3.
[env:esp32dev_l298n]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600
board_microros_distro = humble
board_microros_transport = serial
build_src_filter = -<main.cpp> +<main_l298n.cpp>
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    hideakitai/MPU9250@^0.4.8
    pololu/VL53L0X@^1.3.1
    pololu/VL53L1X@^1.3.1
build_flags =
    -D CONFIG_MICRO_ROS_APP_STACK=8192
    -D CONFIG_MICRO_ROS_APP_TASK_PRIO=5
board_microros_user_meta = microros_deck.meta

[env:esp32dev_l298n_wifi]
extends = env:esp32dev_l298n
board_microros_transport = wifi
# First build with microros_deck.meta may rebuild micro-ROS lib (can take 10–20 min).

; RPLIDAR A1: UART2 ↔ WiFi TCP :20108 (no micro-ROS).
[env:esp32dev_rplidar_bridge]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Many cheap WROOM boards drop the link if upload_speed stays at 460800.
upload_speed = 115200
build_src_filter = -<main.cpp> -<main_l298n.cpp> +<main_rplidar_bridge.cpp>
build_flags =
    -D CORE_DEBUG_LEVEL=0
